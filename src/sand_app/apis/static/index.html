<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAND</title>
  <script src="https://cdn.jsdelivr.net/npm/keycloak-js@25/dist/keycloak.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 2rem 1rem;
      color: #1a1a1a;
      background: #fafafa;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 1.5rem;
    }

    #auth-area {
      font-size: 0.9rem;
      color: #666;
    }

    #auth-area button {
      padding: 0.3rem 0.8rem;
      font-size: 0.85rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      cursor: pointer;
      background: #fff;
      margin-left: 0.5rem;
    }

    #auth-area button:hover {
      background: #f0f0f0;
    }

    #login-prompt {
      text-align: center;
      padding: 3rem 1rem;
      color: #666;
    }

    #login-prompt button {
      padding: 0.6rem 1.5rem;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #1a1a1a;
      color: #fff;
      margin-top: 1rem;
    }

    #login-prompt button:hover {
      background: #333;
    }

    #app-content {
      display: none;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      padding: 0.75rem;
      font-size: 1rem;
      font-family: inherit;
      border: 1px solid #ccc;
      border-radius: 6px;
      resize: vertical;
    }

    textarea:focus {
      outline: none;
      border-color: #555;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1rem 0;
    }

    #record-btn {
      padding: 0.6rem 1.5rem;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #1a1a1a;
      color: #fff;
      transition: background 0.15s;
    }

    #record-btn:hover {
      background: #333;
    }

    #record-btn.recording {
      background: #c0392b;
    }

    #record-btn.recording:hover {
      background: #e74c3c;
    }

    #record-btn:disabled {
      background: #999;
      cursor: not-allowed;
    }

    #upload-btn {
      padding: 0.6rem 1.5rem;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #1a1a1a;
      color: #fff;
      transition: background 0.15s;
    }

    #upload-btn:hover {
      background: #333;
    }

    #upload-btn:disabled {
      background: #999;
      cursor: not-allowed;
    }

    #status {
      font-size: 0.9rem;
      color: #666;
    }

    #error {
      color: #c0392b;
      font-size: 0.9rem;
      margin-top: 0.5rem;
      display: none;
    }

    #pipeline-btn {
      padding: 0.6rem 1.5rem;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #2c7a3a;
      color: #fff;
      transition: background 0.15s;
      margin-top: 0.5rem;
    }

    #pipeline-btn:hover {
      background: #35913f;
    }

    #pipeline-btn:disabled {
      background: #999;
      cursor: not-allowed;
    }

    #results {
      margin-top: 1.5rem;
      display: none;
    }

    #results h2 {
      font-size: 1.15rem;
      margin-bottom: 0.75rem;
    }

    .result-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 0.75rem 1rem;
      margin-bottom: 0.75rem;
    }

    .result-card .name {
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .result-card .upload-id {
      font-size: 0.85rem;
      color: #555;
      font-family: monospace;
      margin-bottom: 0.25rem;
    }

    .result-card a {
      font-size: 0.9rem;
      color: #2c7a3a;
    }

    .result-card details {
      margin-top: 0.5rem;
    }

    .result-card summary {
      font-size: 0.85rem;
      color: #666;
      cursor: pointer;
    }

    .result-card pre {
      font-size: 0.8rem;
      background: #f5f5f5;
      padding: 0.5rem;
      border-radius: 4px;
      overflow-x: auto;
      margin-top: 0.25rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>SAND</h1>
    <div id="auth-area"></div>
  </header>

  <div id="login-prompt">
    <p>Please log in with your NOMAD account to use SAND.</p>
    <button id="login-btn">Log in</button>
  </div>

  <div id="app-content">
    <textarea id="text" placeholder="Type or paste text here, or use the record button below..."></textarea>

    <div class="controls">
      <button id="record-btn" aria-label="Start recording">Record</button>
      <button id="upload-btn" type="button" aria-label="Upload audio file">Upload file</button>
      <input type="file" id="upload-input" accept="audio/wav,audio/mp3,audio/mpeg,audio/mp4,audio/x-m4a,audio/webm,audio/ogg,audio/flac" hidden>
      <span id="status" aria-live="polite" aria-atomic="true"></span>
    </div>

    <button id="pipeline-btn">Extract &amp; Upload</button>

    <p id="error" role="alert"></p>

    <div id="results">
      <h2>Uploaded processes</h2>
      <div id="results-list"></div>
    </div>
  </div>

  <script>
    let keycloak = null;

    // Fetch Keycloak config from backend, then init
    async function initAuth() {
      const res = await fetch("auth/config");
      const cfg = await res.json();

      keycloak = new Keycloak({
        url: cfg.keycloak_url,
        realm: cfg.keycloak_realm,
        clientId: cfg.keycloak_client_id,
      });

      const authenticated = await keycloak.init({
        onLoad: "check-sso",
        checkLoginIframe: false,
      });

      if (authenticated) {
        showApp();
      } else {
        showLoginPrompt();
      }

      // Auto-refresh token before it expires
      setInterval(() => {
        if (keycloak.authenticated) {
          keycloak.updateToken(30).catch(() => {
            showLoginPrompt();
          });
        }
      }, 10000);
    }

    function showLoginPrompt() {
      document.getElementById("login-prompt").style.display = "block";
      document.getElementById("app-content").style.display = "none";
      document.getElementById("auth-area").innerHTML = "";
    }

    function showApp() {
      document.getElementById("login-prompt").style.display = "none";
      document.getElementById("app-content").style.display = "block";

      const name = keycloak.tokenParsed.preferred_username || keycloak.tokenParsed.name || "";
      document.getElementById("auth-area").innerHTML =
        name + '<button id="logout-btn">Log out</button>';
      document.getElementById("logout-btn").addEventListener("click", () => {
        keycloak.logout({ redirectUri: window.location.href });
      });
    }

    document.getElementById("login-btn").addEventListener("click", () => {
      keycloak.login({ redirectUri: window.location.href });
    });

    // Helper: get auth header with fresh token
    async function authFetch(url, options = {}) {
      if (keycloak.authenticated) {
        try { await keycloak.updateToken(5); } catch { /* ignore */ }
        options.headers = options.headers || {};
        options.headers["Authorization"] = "Bearer " + keycloak.token;
      }
      return fetch(url, options);
    }

    // --- App logic (same as before, but using authFetch) ---

    const textArea = document.getElementById("text");
    const recordBtn = document.getElementById("record-btn");
    const status = document.getElementById("status");
    const error = document.getElementById("error");

    let mediaRecorder = null;
    let chunks = [];
    let timerInterval = null;
    let startTime = 0;

    function showError(msg) {
      error.textContent = msg;
      error.style.display = "block";
    }

    function clearError() {
      error.textContent = "";
      error.style.display = "none";
    }

    function formatTime(ms) {
      const seconds = Math.floor(ms / 1000);
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return m + ":" + String(s).padStart(2, "0");
    }

    function startTimer() {
      startTime = Date.now();
      timerInterval = setInterval(() => {
        status.textContent = "Recording " + formatTime(Date.now() - startTime);
      }, 200);
    }

    function stopTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
    }

    async function startRecording() {
      clearError();
      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (err) {
        showError("Microphone access denied. Check your browser permissions.");
        return;
      }

      chunks = [];
      mediaRecorder = new MediaRecorder(stream);

      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) chunks.push(e.data);
      };

      mediaRecorder.onstop = async () => {
        stream.getTracks().forEach((t) => t.stop());

        const blob = new Blob(chunks, { type: mediaRecorder.mimeType });
        if (blob.size === 0) {
          showError("No audio recorded.");
          status.textContent = "";
          uploadBtn.disabled = false;
          return;
        }

        await transcribe(blob);
      };

      mediaRecorder.start();
      recordBtn.textContent = "Stop";
      recordBtn.setAttribute("aria-label", "Stop recording");
      recordBtn.classList.add("recording");
      uploadBtn.disabled = true;
      startTimer();
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
      }
      stopTimer();
      recordBtn.textContent = "Record";
      recordBtn.setAttribute("aria-label", "Start recording");
      recordBtn.classList.remove("recording");
    }

    async function handleTranscriptionResponse(fetchPromise) {
      const res = await fetchPromise;
      if (!res.ok) {
        const body = await res.json().catch(() => null);
        const detail = body && body.detail ? body.detail : res.statusText;
        showError("Transcription failed: " + detail);
        return;
      }
      const data = await res.json();
      if (textArea.value && !textArea.value.endsWith("\n")) {
        textArea.value += "\n";
      }
      textArea.value += data.text;
    }

    async function transcribe(blob) {
      recordBtn.disabled = true;
      uploadBtn.disabled = true;
      recordBtn.textContent = "Transcribing...";
      status.textContent = "";
      clearError();

      const mimeSubtype = blob.type ? blob.type.split(";")[0].split("/")[1] : null;
      const ext = mimeSubtype || "wav";
      const form = new FormData();
      form.append("file", blob, "recording." + ext);

      try {
        await handleTranscriptionResponse(
          authFetch("api/transcribe", { method: "POST", body: form })
        );
      } catch (err) {
        showError("Network error: " + err.message);
      } finally {
        recordBtn.textContent = "Record";
        recordBtn.disabled = false;
        uploadBtn.disabled = false;
      }
    }

    const uploadInput = document.getElementById("upload-input");
    const uploadBtn = document.getElementById("upload-btn");

    uploadBtn.addEventListener("click", () => {
      uploadInput.click();
    });

    uploadInput.addEventListener("change", async () => {
      const file = uploadInput.files[0];
      uploadInput.value = "";
      if (!file) return;

      clearError();
      const MAX_SIZE = 25 * 1024 * 1024;
      if (file.size > MAX_SIZE) {
        showError("File too large (max 25 MB).");
        return;
      }
      recordBtn.disabled = true;
      uploadBtn.disabled = true;
      status.textContent = "Transcribing uploaded file...";

      const form = new FormData();
      form.append("file", file);

      try {
        await handleTranscriptionResponse(
          authFetch("api/transcribe", { method: "POST", body: form })
        );
      } catch (err) {
        showError("Network error: " + err.message);
      } finally {
        recordBtn.disabled = false;
        uploadBtn.disabled = false;
        status.textContent = "";
      }
    });

    const pipelineBtn = document.getElementById("pipeline-btn");
    const resultsDiv = document.getElementById("results");
    const resultsList = document.getElementById("results-list");

    async function runPipeline() {
      const text = textArea.value.trim();
      if (!text) {
        showError("Nothing to process. Record or type something first.");
        return;
      }

      clearError();
      resultsDiv.style.display = "none";
      resultsList.replaceChildren();
      pipelineBtn.disabled = true;
      pipelineBtn.textContent = "Extracting & uploading...";

      try {
        const res = await authFetch("api/pipeline", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text }),
        });
        if (!res.ok) {
          const body = await res.json().catch(() => null);
          const detail = body && body.detail ? body.detail : res.statusText;
          showError("Pipeline failed: " + detail);
          return;
        }
        const data = await res.json();
        if (!data.processes || data.processes.length === 0) {
          showError("No processes were extracted from the text.");
          return;
        }

        for (const p of data.processes) {
          const card = document.createElement("div");
          card.className = "result-card";

          const name = document.createElement("div");
          name.className = "name";
          name.textContent = p.name;

          const uploadId = document.createElement("div");
          uploadId.className = "upload-id";
          uploadId.textContent = "Upload ID: " + p.upload_id;

          const link = document.createElement("a");
          link.href = p.entry_url;
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          link.textContent = "View on NOMAD";

          const details = document.createElement("details");
          const summary = document.createElement("summary");
          summary.textContent = "Archive JSON";
          const pre = document.createElement("pre");
          pre.textContent = JSON.stringify(p.archive, null, 2);
          details.appendChild(summary);
          details.appendChild(pre);

          card.append(name, uploadId, link, details);
          resultsList.appendChild(card);
        }
        resultsDiv.style.display = "block";
      } catch (err) {
        showError("Network error: " + err.message);
      } finally {
        pipelineBtn.disabled = false;
        pipelineBtn.textContent = "Extract & Upload";
      }
    }

    pipelineBtn.addEventListener("click", runPipeline);

    recordBtn.addEventListener("click", () => {
      if (mediaRecorder && mediaRecorder.state === "recording") {
        stopRecording();
      } else {
        startRecording();
      }
    });

    window.addEventListener("beforeunload", () => {
      if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stream.getTracks().forEach((t) => t.stop());
      }
    });

    // Start auth
    initAuth().catch((err) => {
      console.error("Auth init failed:", err);
      showLoginPrompt();
    });
  </script>
</body>
</html>
